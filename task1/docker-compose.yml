services:
  nginx:
    image: nginx:latest
    container_name: dev_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - db

  php:
    build: .
    container_name: dev_php
    command: >
      sh -c "composer install --working-dir=/var/www/html && php-fpm"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db

  frontend:
    image: node:22-alpine
    container_name: dev_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"

  db:
    image: mariadb:11
    container_name: dev_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: xbagins
      MYSQL_PASSWORD: pass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dev_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: xbagins
      PMA_PASSWORD: pass
    depends_on:
      - db

volumes:
  db_data:
